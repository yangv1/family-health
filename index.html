<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家族健康檔案庫</title>
<style>
:root{--bg:#F7F4EF;--bg2:#EDEAE3;--ink:#1C1B18;--ink2:#5A5750;--ink3:#9A9690;--accent:#C4552A;--green:#3A7D5C;--blue:#2E5FA3;--purple:#7B5EA7;--card:#FFFFFF;--border:#D8D4CC;--r:12px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px}
header{background:var(--card);border-bottom:1px solid var(--border);padding:0 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;height:52px;gap:10px}
#hBack{display:none;background:none;border:none;color:var(--accent);font-size:15px;cursor:pointer;padding:4px 0;white-space:nowrap;font-family:inherit}
#hBack.on{display:flex;align-items:center;gap:3px}
#hTitle{font-size:16px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;user-select:none}
#adminBtn{background:none;border:none;cursor:pointer;font-size:18px;padding:4px;opacity:0.4;transition:opacity .2s}
#adminBtn:hover{opacity:1}
.pg{display:none;padding-bottom:80px}.pg.on{display:block}

/* HOME */
#home{padding:20px 16px 80px}
.greeting h1{font-size:24px;font-weight:300;line-height:1.3;margin-bottom:4px}
.greeting p{font-size:12px;color:var(--ink3);margin-bottom:20px}
.alert-box{background:#FEF3EC;border:1px solid #F0C4A8;border-radius:var(--r);padding:12px 14px;margin-bottom:20px}
.alert-box h3{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:6px}
.ai{font-size:12px;color:var(--ink2);padding:2px 0 2px 12px;position:relative;line-height:1.4}
.ai::before{content:'•';position:absolute;left:0;color:var(--accent)}
.st{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;position:relative;overflow:hidden;transition:opacity .2s}
.mc:active{opacity:.85}
.mc.hidden-member{opacity:.5;border-style:dashed}
.mc-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:10px}
.mc-hidden-badge{position:absolute;top:10px;right:10px;background:var(--ink3);color:#fff;font-size:9px;font-weight:600;padding:2px 5px;border-radius:10px}
.mc-av{width:36px;height:36px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px}
.mc-name{font-size:15px;font-weight:600}
.mc-id{font-size:11px;color:var(--ink3);margin-top:1px}
.mc-stats{display:flex;gap:6px;margin-top:8px}
.stat{font-size:10px;color:var(--ink3);background:var(--bg);padding:2px 7px;border-radius:20px}
.stat b{color:var(--ink2)}
.toggle-vis{position:absolute;bottom:10px;right:10px;background:none;border:1px solid var(--border);border-radius:6px;font-size:10px;padding:2px 6px;cursor:pointer;color:var(--ink3);font-family:inherit;display:none}
.admin-mode .toggle-vis{display:block}
.admin-mode .mc{cursor:default}
.admin-mode .mc.clickable{cursor:pointer}

/* ADMIN PANEL */
#adminBar{display:none;background:#1C1B18;color:#fff;padding:10px 16px;font-size:13px;align-items:center;gap:10px;position:sticky;top:52px;z-index:90}
#adminBar.on{display:flex}
#adminBar span{flex:1}
#exitAdminBtn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--card);border-radius:16px;padding:24px 20px;width:calc(100% - 48px);max-width:320px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--ink2);margin-bottom:16px}
.modal input{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:20px;letter-spacing:.3em;text-align:center;font-family:inherit;outline:none;transition:border-color .15s}
.modal input:focus{border-color:var(--accent)}
.modal input.err{border-color:#C42A2A;animation:shake .3s}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--card);color:var(--ink)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* MEMBER */
.hero{background:var(--card);border-bottom:1px solid var(--border);padding:16px}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.hero-av{width:52px;height:52px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:26px}
.hero-name{font-size:20px;font-weight:700}
.hero-id{font-size:12px;color:var(--ink3);margin-top:2px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--ink2);background:var(--bg)}
.tag.r{border-color:#F0C4A8;background:#FEF3EC;color:var(--accent)}
.tag.a{border-color:#F9D6D6;background:#FEF0F0;color:#C42A2A}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:52px;z-index:50}
.tab{flex:1;padding:13px 0;background:none;border:none;font-size:13px;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all .15s}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tc{display:none;padding:16px}.tc.on{display:block}

/* TIMELINE */
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fb{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--ink2);cursor:pointer;font-family:inherit}
.fb.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.tl-yr{font-size:11px;color:var(--ink3);padding:12px 0 6px;letter-spacing:.04em}
.ti{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--bg2);cursor:pointer}
.ti:last-child{border-bottom:none}
.ti:active{background:var(--bg2);border-radius:8px;margin:0 -4px;padding-left:4px;padding-right:4px}
.ti-l{width:38px;flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.ti-d{font-size:10px;color:var(--ink3);text-align:center;line-height:1.3}
.ti-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ti-line{width:1px;background:var(--border);flex:1;margin-top:4px}
.ti-r{flex:1}
.ti-type{font-size:11px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.ti-pend{background:var(--accent);color:#fff;font-size:9px;padding:1px 4px;border-radius:3px}
.ti-title{font-size:13px;font-weight:500;line-height:1.4}
.ti-desc{font-size:11px;color:var(--ink3);margin-top:2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.c看診紀錄{color:var(--blue)}.d看診紀錄{background:var(--blue)}
.c用藥變化{color:var(--green)}.d用藥變化{background:var(--green)}
.c檢查結果{color:var(--purple)}.d檢查結果{background:var(--purple)}
.c症狀觀察{color:#A07B1A}.d症狀觀察{background:#E8B84B}

/* MEDS */
.med-list{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.med{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.med-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.med-dot.off{background:var(--ink3)}
.med-name{font-size:13px;font-weight:500;flex:1}
.med-dose{font-size:11px;color:var(--ink3)}
.med-sub{font-size:11px;color:var(--ink3);margin-top:1px}

/* GUIDE */
.guide-list{display:flex;flex-direction:column;gap:8px}
.guide{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.guide-top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.g-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0}
.guide-title{font-size:13px;font-weight:500;flex:1}
.imp{font-size:10px;padding:2px 6px;border-radius:10px}
.imp高{background:#FEF3EC;color:var(--accent)}.imp中{background:#FEF9EC;color:#A07B1A}.imp低{background:var(--bg2);color:var(--ink3)}
.guide-meta{font-size:11px;color:var(--ink3);display:flex;flex-wrap:wrap;gap:8px}

/* EVENT */
#event-pg{padding:16px 16px 80px}
.ev-head{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:12px}
.ev-type{font-size:12px;font-weight:600;margin-bottom:6px}
.ev-title{font-size:19px;font-weight:700;line-height:1.3;margin-bottom:8px}
.ev-date{font-size:12px;color:var(--ink3)}
.ev-pend{display:inline-flex;align-items:center;gap:5px;background:#FEF3EC;color:var(--accent);border:1px solid #F0C4A8;font-size:12px;padding:5px 10px;border-radius:7px;margin-top:10px}
.ev-sec{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.ev-lbl{font-size:10px;color:var(--ink3);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px}
.ev-val{font-size:13px;line-height:1.65;white-space:pre-wrap}

/* PENDING */
#pending-pg{padding:16px 16px 80px}
.pend-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r);padding:13px 14px;margin-bottom:10px;cursor:pointer}
.pend-item:active{opacity:.8}
.pend-name{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:3px}
.pend-title{font-size:14px;font-weight:500;margin-bottom:4px}
.pend-note{font-size:12px;color:var(--ink3)}
.empty{text-align:center;padding:36px 16px;color:var(--ink3);font-size:13px}

/* NAV */
nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0;background:none;border:none;cursor:pointer;gap:2px;color:var(--ink3);font-size:10px;font-family:inherit}
.nb.on{color:var(--accent)}
.nb span:first-child{font-size:20px}
</style>
</head>
<body>

<header>
  <button id="hBack" onclick="goBack()">← 返回</button>
  <div id="hTitle" >🏥 家族健康檔案庫</div>
  <button id="adminBtn" onclick="openAdminLogin()" title="管理員">⚙️</button>
</header>

<div id="adminBar">
  <span>⚙️ 管理員模式　點卡片上的按鈕切換可見性</span>
  <button id="exitAdminBtn" onclick="exitAdmin()">離開</button>
</div>

<!-- Login Modal -->
<div class="overlay" id="loginOverlay">
  <div class="modal">
    <h3>🔐 管理員登入</h3>
    <p>請輸入管理員密碼</p>
    <input type="password" id="pwInput" maxlength="8" placeholder="••••" oninput="onPwInput()" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-btns">
      <button class="btn" onclick="closeLogin()">取消</button>
      <button class="btn primary" onclick="checkPw()">確認</button>
    </div>
  </div>
</div>

<div class="pg on" id="home">
  <div class="greeting"><h1>家族健康<br>檔案庫</h1><p id="today"></p></div>
  <div class="alert-box" id="alertBox" style="display:none">
    <h3>⚠️ 待追蹤事項</h3><div id="alertList"></div>
  </div>
  <div class="st">家族成員</div>
  <div class="grid" id="memberGrid"></div>
</div>

<div class="pg" id="member-pg">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-av" id="hAv"></div>
      <div><div class="hero-name" id="hName"></div><div class="hero-id" id="hId"></div></div>
    </div>
    <div class="tags" id="hTags"></div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="swTab('tl',this)">事件紀錄</button>
    <button class="tab" onclick="swTab('med',this)">用藥清單</button>
    <button class="tab" onclick="swTab('guide',this)">照顧指南</button>
  </div>
  <div class="tc on" id="tc-tl">
    <div class="filters">
      <button class="fb on" onclick="filterTL('全部',this)">全部</button>
      <button class="fb" onclick="filterTL('看診紀錄',this)">看診</button>
      <button class="fb" onclick="filterTL('用藥變化',this)">用藥</button>
      <button class="fb" onclick="filterTL('檢查結果',this)">檢查</button>
      <button class="fb" onclick="filterTL('症狀觀察',this)">症狀</button>
    </div>
    <div id="tlItems"></div>
  </div>
  <div class="tc" id="tc-med">
    <div class="st">目前服用中</div><div class="med-list" id="medCur"></div>
    <div class="st">已停藥／歷史</div><div class="med-list" id="medOld"></div>
  </div>
  <div class="tc" id="tc-guide"><div class="guide-list" id="guideList"></div></div>
</div>

<div class="pg" id="event-pg">
  <div class="ev-head">
    <div class="ev-type" id="evType"></div>
    <div class="ev-title" id="evTitle"></div>
    <div class="ev-date" id="evDate"></div>
    <div class="ev-pend" id="evPend" style="display:none">⚠️ 待追蹤</div>
  </div>
  <div id="evSecs"></div>
</div>

<div class="pg" id="pending-pg">
  <div class="st" style="padding:16px 16px 0">所有待追蹤事項</div>
  <div style="padding:8px 16px 0" id="pendList"></div>
</div>

<nav id="nav">
  <button class="nb on" onclick="showHome()"><span>🏠</span><span>首頁</span></button>
  <button class="nb" onclick="showPend()"><span>⚠️</span><span>待追蹤</span></button>
</nav>

// ── STATE ──
let cur={member:null,event:null,filter:'全部',tab:'tl'};
let hist=[];
let isAdmin=false;
// 從 localStorage 讀取可見設定，若無則用預設值
let visibility=JSON.parse(localStorage.getItem('visibility')||'null') ||
  Object.fromEntries(D.members.map(m=>[m.id, DEFAULT_VISIBLE.includes(m.id)]));

// ── INIT ──
const dw=['日','一','二','三','四','五','六'],dn=new Date();
document.getElementById('today').textContent=`${dn.getFullYear()}/${String(dn.getMonth()+1).padStart(2,'0')}/${String(dn.getDate()).padStart(2,'0')} 週${dw[dn.getDay()]}`;

// ── ALERTS ──
function renderAlerts(){
  const visibleIds=D.members.filter(m=>visibility[m.id]).map(m=>m.eIds).flat();
  const pendAll=visibleIds.map(id=>D.events[id]).filter(e=>e?.pending);
  if(pendAll.length){
    document.getElementById('alertBox').style.display='block';
    document.getElementById('alertList').innerHTML=pendAll.slice(0,5).map(e=>`<div class="ai">${e.title}${e.note?'　<span style="color:var(--ink3)">'+e.note.slice(0,28)+'</span>':''}</div>`).join('');
  } else {
    document.getElementById('alertBox').style.display='none';
  }
}

// ── MEMBER GRID ──
function renderGrid(){
  function cntPend(m){return m.eIds.filter(id=>D.events[id]?.pending).length}
  const showAll=isAdmin;
  const visible=D.members.filter(m=>showAll||visibility[m.id]);

  document.getElementById('memberGrid').innerHTML=D.members
    .filter(m=>showAll||visibility[m.id])
    .map(m=>{
      const hidden=!visibility[m.id];
      const pending=cntPend(m);
      return `<div class="mc ${hidden?'hidden-member':''} ${isAdmin?'':'clickable'}" ${!isAdmin?`onclick="openMember('${m.id}')"`:''}">
        ${isAdmin
          ? `<button class="toggle-vis" onclick="toggleVis('${m.id}')">${hidden?'👁 顯示':'🙈 隱藏'}</button>`
          : (pending>0?`<div class="mc-badge">${pending} 待追</div>`:'')
        }
        ${hidden&&isAdmin?`<div class="mc-hidden-badge">隱藏中</div>`:''}
        <div class="mc-av">${m.av}</div>
        <div class="mc-name">${m.name}</div>
        <div class="mc-id">${m.id}</div>
        <div class="mc-stats">
          <div class="stat"><b>${m.eIds.length}</b> 事件</div>
          <div class="stat"><b>${m.mIds.length}</b> 用藥</div>
        </div>
      </div>`;
    }).join('');

  // 管理員模式下也顯示隱藏的成員（但有虛線樣式）
  if(isAdmin){
    const hiddenMembers=D.members.filter(m=>!visibility[m.id]);
    if(hiddenMembers.length&&!document.querySelector('.hidden-member')){
      // already included above
    }
  }
}

// ── ADMIN ──
function openAdminLogin(){
  if(isAdmin){exitAdmin();return;}
  document.getElementById('pwInput').value='';
  document.getElementById('pwInput').classList.remove('err');
  document.getElementById('loginOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('pwInput').focus(),100);
}
function closeLogin(){document.getElementById('loginOverlay').classList.remove('on')}
function onPwInput(){document.getElementById('pwInput').classList.remove('err')}
function checkPw(){
  const pw=document.getElementById('pwInput').value;
  if(pw===ADMIN_PW){
    closeLogin();enterAdmin();
  } else {
    const inp=document.getElementById('pwInput');
    inp.classList.add('err');inp.value='';
    setTimeout(()=>inp.classList.remove('err'),400);
  }
}
function enterAdmin(){
  isAdmin=true;
  document.getElementById('adminBar').classList.add('on');
  document.getElementById('adminBtn').style.opacity='1';
  document.getElementById('home').classList.add('admin-mode');
  renderGrid();
}
function exitAdmin(){
  isAdmin=false;
  document.getElementById('adminBar').classList.remove('on');
  document.getElementById('adminBtn').style.opacity='0.4';
  document.getElementById('home').classList.remove('admin-mode');
  renderGrid();renderAlerts();
}
function toggleVis(id){
  visibility[id]=!visibility[id];
  localStorage.setItem('visibility',JSON.stringify(visibility));
  renderGrid();
}

// ── MEMBER PAGE ──
function openMember(id){
  if(isAdmin)return;
  const m=D.members.find(x=>x.id===id);if(!m)return;
  cur.member=m;cur.filter='全部';cur.tab='tl';hist.push('home');
  document.getElementById('hAv').textContent=m.av;
  document.getElementById('hName').textContent=m.name;
  document.getElementById('hId').textContent=m.id;
  const tags=[];
  if(m.chronic.length)m.chronic.forEach(c=>tags.push(`<span class="tag r">${c}</span>`));
  if(m.allergy)tags.push(`<span class="tag a">⚠️ 過敏：${m.allergy}</span>`);
  if(!tags.length)tags.push(`<span class="tag">無特殊病史記錄</span>`);
  document.getElementById('hTags').innerHTML=tags.join('');
  renderTL();renderMeds();renderGuide();
  resetTabs();showPg('member-pg',m.name);
}

function renderTL(){
  const m=cur.member;
  let evs=m.eIds.map(id=>({id,...D.events[id]})).filter(e=>e.title);
  if(cur.filter!=='全部')evs=evs.filter(e=>e.type===cur.filter);
  evs.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(!evs.length){document.getElementById('tlItems').innerHTML='<div class="empty">沒有相關紀錄</div>';return;}
  const by={};
  evs.forEach(e=>{const y=e.date?e.date.split('-')[0]:'不明';(by[y]||(by[y]=[])).push(e)});
  let html='';
  Object.keys(by).sort((a,b)=>b-a).forEach(y=>{
    html+=`<div class="tl-yr">${y}</div>`;
    by[y].forEach((e,i)=>{
      const mm=e.date?e.date.split('-')[1]:'',dd=e.date?e.date.split('-')[2]:'';
      html+=`<div class="ti" onclick="openEvent('${e.id}')">
        <div class="ti-l"><div class="ti-d">${mm||'—'}<br>${dd||''}</div><div class="ti-dot d${e.type}"></div>${i<by[y].length-1?'<div class="ti-line"></div>':''}</div>
        <div class="ti-r"><div class="ti-type c${e.type}">${e.type}${e.pending?'<span class="ti-pend">待追蹤</span>':''}</div><div class="ti-title">${e.title}</div>${e.desc?`<div class="ti-desc">${e.desc}</div>`:''}</div>
      </div>`;
    });
  });
  document.getElementById('tlItems').innerHTML=html;
}
function filterTL(t,btn){cur.filter=t;document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderTL()}

function renderMeds(){
  const m=cur.member,all=m.mIds.map(id=>({id,...D.meds[id]})).filter(x=>x.name);
  const c=all.filter(x=>x.status==='服用中'),o=all.filter(x=>x.status!=='服用中');
  const mh=arr=>arr.length?arr.map(x=>`<div class="med"><div class="med-dot ${x.status!=='服用中'?'off':''}"></div><div style="flex:1"><div class="med-name">${x.name}</div><div class="med-sub">${[x.dept,x.time,x.note].filter(Boolean).join(' · ')}</div></div>${x.dose?`<div class="med-dose">${x.dose}</div>`:''}</div>`).join(''):'<div class="empty" style="padding:12px 0">無資料</div>';
  document.getElementById('medCur').innerHTML=mh(c);
  document.getElementById('medOld').innerHTML=mh(o);
}

function renderGuide(){
  const m=cur.member,items=m.gIds.map(id=>({id,...D.guide[id]})).filter(x=>x.title);
  if(!items.length){document.getElementById('guideList').innerHTML='<div class="empty">尚無照顧指南</div>';return;}
  document.getElementById('guideList').innerHTML=items.map(g=>`
    <div class="guide"><div class="guide-top"><div class="g-dot"></div><div class="guide-title">${g.title}</div>${g.imp?`<span class="imp imp${g.imp}">${g.imp}</span>`:''}</div>
    <div class="guide-meta">${g.hospital?`<span>🏥 ${g.hospital}</span>`:''} ${g.dept?`<span>${g.dept}</span>`:''} ${g.freq?`<span>🔄 ${g.freq}</span>`:''} ${g.next?`<span>📅 下次 ${g.next.replace(/-/g,'/')}</span>`:''}</div>
    ${g.note?`<div style="font-size:12px;color:var(--ink2);margin-top:6px">${g.note}</div>`:''}</div>`).join('');
}

function openEvent(id){
  const e={id,...D.events[id]};if(!e.title)return;
  cur.event=e;hist.push('member-pg');
  document.getElementById('evType').innerHTML=`<span class="c${e.type}">● ${e.type}</span>`;
  document.getElementById('evTitle').textContent=e.title;
  document.getElementById('evDate').textContent=e.date?e.date.replace(/-/g,'/'):'日期不明';
  document.getElementById('evPend').style.display=e.pending?'inline-flex':'none';
  const secs=[];
  if(e.desc)secs.push(['主訴 / 描述',e.desc]);
  if(e.diag)secs.push(['診斷',e.diag]);
  if(e.med)secs.push(['用藥異動',e.med]);
  if(e.note)secs.push(['追蹤備註',e.note]);
  if(e.src)secs.push(['資料來源',e.src]);
  document.getElementById('evSecs').innerHTML=secs.map(([l,v])=>`<div class="ev-sec"><div class="ev-lbl">${l}</div><div class="ev-val">${v}</div></div>`).join('')||'<div class="ev-sec"><div class="ev-lbl">備註</div><div class="ev-val" style="color:var(--ink3)">無詳細資料</div></div>';
  showPg('event-pg',e.title.slice(0,16)+(e.title.length>16?'…':''));
}

function showPend(){
  const items=[];
  D.members.filter(m=>visibility[m.id]).forEach(m=>m.eIds.forEach(id=>{const e=D.events[id];if(e?.pending)items.push({member:m.name,id,...e})}));
  document.getElementById('pendList').innerHTML=items.map(e=>`<div class="pend-item" onclick="openEventFromPend('${e.id}')"><div class="pend-name">${e.member}</div><div class="pend-title">${e.title}</div>${e.note?`<div class="pend-note">${e.note}</div>`:''}</div>`).join('')||'<div class="empty">目前沒有待追蹤事項</div>';
  hist.push('home');showPg('pending-pg','待追蹤事項');
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',i===1));
}

function openEventFromPend(id){
  const m=D.members.find(m=>m.eIds.includes(id));if(m)cur.member=m;openEvent(id);
}

function showPg(id,title){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  const isHome=id==='home';
  document.getElementById('hTitle').textContent=isHome?'🏥 家族健康檔案庫':title;
  document.getElementById('hBack').classList.toggle('on',!isHome);
  document.getElementById('adminBtn').style.display=isHome?'block':'none';
  document.getElementById('nav').style.display=id==='event-pg'?'none':'flex';
  if(isHome)document.getElementById('adminBar').classList.toggle('on',isAdmin);
  else document.getElementById('adminBar').classList.remove('on');
  window.scrollTo(0,0);
}

function showHome(){
  hist=[];showPg('home','');
  if(isAdmin)document.getElementById('adminBar').classList.add('on');
  document.querySelectorAll('.nb').forEach((b,i)=>b.classList.toggle('on',i===0));
}

function goBack(){
  const prev=hist.pop();
  if(!prev||prev==='home'){showHome();return;}
  document.getElementById('nav').style.display='flex';
  if(isAdmin)document.getElementById('adminBar').classList.add('on');
  showPg(prev,cur.member?.name||'');
}

function swTab(tab,btn){
  cur.tab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');document.getElementById('tc-'+tab).classList.add('on');
}

function resetTabs(){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===0));
  document.querySelectorAll('.tc').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('.fb').forEach((b,i)=>b.classList.toggle('on',i===0));
}

// ── START ──
renderGrid();
renderAlerts();
</script>
</body>
</html>
